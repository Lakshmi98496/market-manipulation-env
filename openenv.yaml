id: market-manipulation-env-v1
name: Market Manipulation Detection
version: 1.0.0
type: environment
sdk: openenv
description: >
  A real-world RL environment where an AI agent monitors a simulated live
  order book and detects market manipulation patterns including spoofing,
  layering, and wash trading. Mirrors SEC/SEBI surveillance systems.
entrypoint: server.app:app
author: Lakshmi98496
 
tasks:
  - name: spoofing_detection
    difficulty: easy
    description: Detect spoofing in a clean order book. 15 steps.
    reward_range: [0.01, 0.99]
    grader:
      type: python
      entrypoint: tasks.graders:grade_easy

  - name: layering_wash_detection
    difficulty: medium
    description: Identify layering and wash trading mixed with HFT noise.
    reward_range: [0.01, 0.99]
    grader:
      type: python
      entrypoint: tasks.graders:grade_medium

  - name: adaptive_adversary_detection
    difficulty: hard
    description: Track an adaptive manipulator through a regime shift.
    reward_range: [0.01, 0.99]
    grader:
      type: python
      entrypoint: tasks.graders:grade_hard
 
endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  grade: POST /tasks/{task_name}/grade
